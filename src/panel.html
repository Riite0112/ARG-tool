<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARG探索ツール</title>
    <link rel="stylesheet" href="panel.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="../icons/icon-32.png" width="32" height="32" alt="">
          <div>
            <input id="sessionTitle" class="title-input" aria-label="調査名" value="ARG探索メモ">
            <p id="activePage" class="active-page">拡張ボタンで現在ページを追加</p>
          </div>
        </div>
        <button id="addCurrentPage" class="icon-button primary-action" type="button">現在ページを保存</button>
      </header>

      <main class="board">
        <section class="page-panel" aria-labelledby="pagePanelTitle">
          <div class="panel-heading">
            <h1 id="pagePanelTitle">追加ページ</h1>
            <span id="pageCount" class="count-pill">0</span>
          </div>
          <div class="page-table-head">
            <span>#</span>
            <span>リンク名 / URL</span>
          </div>
          <ol id="pageList" class="page-list"></ol>
        </section>

        <section class="detail-panel" aria-live="polite">
          <div id="emptyDetail" class="empty-detail">
            右上の拡張機能ボタンを押すと、現在開いているページが左の一覧に追加されます。
          </div>
          <article id="pageDetail" class="page-detail hidden">
            <div class="detail-topline">
              <span id="detailNumber" class="detail-number"></span>
              <button id="deleteSelectedPage" class="ghost-button danger-text" type="button">削除</button>
            </div>
            <h2 id="detailTitle"></h2>
            <a id="detailUrl" class="detail-url" href="#" target="_blank" rel="noreferrer"></a>
            <label class="detail-note-label">
              メモ
              <textarea id="detailNotes" rows="6" placeholder="このページで見つけたこと、仮説、次に見る場所"></textarea>
            </label>
          </article>
        </section>
      </main>

      <section class="keyword-dock" aria-labelledby="keywordTitle">
        <div class="dock-heading">
          <h2 id="keywordTitle">キーワード</h2>
          <span id="keywordCount" class="count-pill">0</span>
        </div>

        <section id="selectionBanner" class="selection-banner hidden">
          <p id="selectionPreview"></p>
          <button id="selectionToKeyword" type="button">キーワードに保存</button>
          <button id="clearSelection" type="button">消去</button>
        </section>

        <form id="keywordForm" class="keyword-form">
          <input id="keywordInput" type="text" placeholder="気になる語句、暗号、合言葉を保存">
          <select id="keywordTarget" aria-label="保存先">
            <option value="primary">主力</option>
            <option value="reserve">保留</option>
          </select>
          <button class="primary-action" type="submit">保存</button>
        </form>

        <ul id="keywordList" class="keyword-list"></ul>

        <div class="data-actions">
          <button id="exportJson" class="ghost-button" type="button">JSONを書き出し</button>
          <label class="file-button">
            JSONを読み込み
            <input id="importJson" type="file" accept="application/json,.json">
          </label>
          <button id="resetData" class="ghost-button danger-text" type="button">リセット</button>
        </div>
      </section>
    </div>

    <template id="pageItemTemplate">
      <li class="page-item">
        <button class="page-select" type="button">
          <span class="page-no"></span>
          <span class="page-main">
            <span class="page-title"></span>
            <span class="page-url"></span>
          </span>
        </button>
      </li>
    </template>

    <template id="keywordTemplate">
      <li class="keyword-item">
        <span class="keyword-bucket"></span>
        <span class="keyword-text"></span>
        <button class="move-keyword" type="button">移動</button>
        <button class="delete-keyword" type="button">削除</button>
      </li>
    </template>

    <script src="panel.js"></script>
  </body>
</html>
