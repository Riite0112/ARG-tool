<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARG探索ツール</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-head">
        <img src="icons/icon-32.png" alt="" class="popup-icon">
        <div class="title-block">
          <strong>ARG探索ツール</strong>
          <span id="siteLabel">読み込み中</span>
        </div>
        <button id="hideButton" class="icon-button danger" type="button" title="非表示">×</button>
      </header>

      <section class="session-card">
        <div class="session-title-row">
          <strong id="sessionTitle">ARG探索メモ</strong>
          <span id="trackedState" class="state-pill">未表示</span>
        </div>
        <div class="metrics">
          <span>
            PAGE
            <strong id="pageCount">0</strong>
          </span>
          <span>
            KEYWORD
            <strong id="keywordCount">0</strong>
          </span>
          <span>
            TARGET
            <strong id="targetPages">-</strong>
          </span>
        </div>
      </section>

      <nav class="tool-tabs" aria-label="表示するツール">
        <button class="tool-tab" type="button" data-view="pages">
          <span class="tab-icon">#</span>
          <strong>ページ</strong>
          <small>左パネル</small>
        </button>
        <button class="tool-tab" type="button" data-view="keywords">
          <span class="tab-icon">⌁</span>
          <strong>キーワード</strong>
          <small>下バー</small>
        </button>
        <button class="tool-tab active" type="button" data-view="all">
          <span class="tab-icon">▣</span>
          <strong>両方</strong>
          <small>通常表示</small>
        </button>
        <button id="hideToolButton" class="tool-tab muted" type="button">
          <span class="tab-icon">×</span>
          <strong>非表示</strong>
          <small>閉じる</small>
        </button>
      </nav>

      <p id="statusText" class="status-text" role="status">表示したい項目を選択してください。</p>
    </main>
    <script src="src/popup.js"></script>
  </body>
</html>
