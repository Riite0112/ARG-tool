<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARG探索ツール</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-head">
        <img src="icons/icon-32.png" alt="" class="popup-icon">
        <div class="title-block">
          <strong>ARG探索ツール</strong>
          <span id="siteLabel">読み込み中</span>
        </div>
        <button id="hideButton" class="icon-button danger" type="button" title="非表示">×</button>
      </header>

      <section class="session-card">
        <div class="session-title-row">
          <strong id="sessionTitle">ARG探索メモ</strong>
          <span id="trackedState" class="state-pill">未表示</span>
        </div>
        <div class="metrics">
          <span>
            PAGE
            <strong id="pageCount">0</strong>
          </span>
          <span>
            KEYWORD
            <strong id="keywordCount">0</strong>
          </span>
          <span>
            TARGET
            <strong id="targetPages">-</strong>
          </span>
        </div>
        <div class="timer-card">
          <div>
            <small>TIMER</small>
            <strong id="timerDisplay">00:00:00</strong>
          </div>
          <button id="timerToggleButton" type="button">Start</button>
          <button id="timerResetButton" type="button">Reset</button>
        </div>
        <div class="theme-card" aria-label="テーマ">
          <small>THEME</small>
          <div class="theme-options">
            <button type="button" data-theme="emerald" aria-pressed="false">緑</button>
            <button type="button" data-theme="aqua" aria-pressed="false">青</button>
            <button type="button" data-theme="violet" aria-pressed="false">紫</button>
            <button type="button" data-theme="slate" aria-pressed="false">灰</button>
          </div>
        </div>
        <div class="copy-card">
          <div>
            <small>COPY</small>
            <strong>コピーを一時保存</strong>
          </div>
          <button id="autoCopyButton" type="button" aria-pressed="false">OFF</button>
        </div>
      </section>

      <nav class="tool-tabs" aria-label="表示する項目">
        <button class="tool-tab" type="button" data-panel="pages" aria-pressed="false">
          <span class="tab-icon">#</span>
          <strong>ページ</strong>
          <small>左パネル</small>
        </button>
        <button class="tool-tab" type="button" data-panel="keywords" aria-pressed="false">
          <span class="tab-icon">⌁</span>
          <strong>キーワード</strong>
          <small>下バー</small>
        </button>
        <button id="hideToolButton" class="tool-tab muted" type="button">
          <span class="tab-icon">×</span>
          <strong>非表示</strong>
          <small>閉じる</small>
        </button>
      </nav>

      <section class="utility-tools" aria-label="調査ツール">
        <div class="utility-tabs">
          <button class="utility-tab" type="button" data-utility="mojibake" aria-pressed="false">文字化け β版</button>
          <button class="utility-tab" type="button" data-utility="qr" aria-pressed="false">QR読取 β版</button>
        </div>

        <section id="mojibakeTool" class="utility-panel" hidden>
          <textarea id="mojibakeInput" class="tool-textarea" rows="3" placeholder="文字化けした文字を貼り付け"></textarea>
          <div class="tool-actions">
            <button id="mojibakePasteButton" type="button">貼付</button>
            <button id="mojibakeFixButton" type="button">復元</button>
            <button id="mojibakeClearButton" type="button">消去</button>
          </div>
          <ul id="mojibakeResults" class="result-list"></ul>
        </section>

        <section id="qrTool" class="utility-panel" hidden>
          <label class="file-picker">
            <span>QR画像を選択</span>
            <input id="qrFileInput" type="file" accept="image/*">
          </label>
          <div class="tool-actions">
            <button id="qrClipboardButton" type="button">画像貼付</button>
            <button id="qrClearButton" type="button">消去</button>
          </div>
          <ul id="qrResults" class="result-list"></ul>
        </section>
      </section>

      <section class="menu-actions" aria-label="連絡と応援">
        <button id="feedbackButton" class="menu-action feedback-action" type="button">
          <span>不具合等の報告はこちらから</span>
        </button>
        <button id="supportPendingButton" class="menu-action support-action" type="button">
          <span>開発者を応援する</span>
        </button>
      </section>

      <p id="statusText" class="status-text" role="status">ページとキーワードを個別に選択できます。</p>
    </main>
    <script src="src/vendor/jsQR.js"></script>
    <script src="src/config.js"></script>
    <script src="src/popup.js"></script>
  </body>
</html>
